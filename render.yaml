services:
  # ── Web Service ──────────────────────────────────────────────
  - type: web
    name: telemed-app
    env: python
    plan: free
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: WEB_CONCURRENCY
        value: "4"

      # Auto-wired from the PostgreSQL database below
      - key: DATABASE_URL
        fromDatabase:
          name: telemed-db
          property: connectionString

      # Auto-wired from the Redis instance below
      - key: REDIS_URL
        fromService:
          type: redis
          name: telemed-redis
          property: connectionString

  # ── Redis (Channel Layer for WebSockets) ─────────────────────
  - type: redis
    name: telemed-redis
    plan: free
    region: oregon
    ipAllowList: []   # internal access only

# ── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: telemed-db
    plan: free
    region: oregon
    databaseName: telemeddb
    user: telemeduser
